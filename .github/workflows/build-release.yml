name: Build Desktop Apps (Windows + macOS) and Upload to Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            py: "3.11"
            exe_name: "ECG_Digitizer"
            build_cmd: >
              pyinstaller --noconsole --onefile
              --name ECG_Digitizer
              --icon icon.ico
              ecg_app.py
            pack_cmd: >
              powershell -Command "Compress-Archive -Path dist\\ECG_Digitizer.exe -DestinationPath ECG_Digitizer_Windows.zip"

          # macOS Apple Silicon (обычно macos-latest = macos-14 arm64)
          - os: macos-latest
            py: "3.11"
            exe_name: "ECG_Digitizer"
            build_cmd: >
              pyinstaller --windowed
              --name ECG_Digitizer
              ecg_app.py
            pack_cmd: >
              ditto -c -k --sequesterRsrc --keepParent "dist/ECG_Digitizer.app" "ECG_Digitizer_macOS.zip"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Package
        run: ${{ matrix.pack_cmd }}

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ECG_Digitizer_Windows.zip
            ECG_Digitizer_macOS.zip
