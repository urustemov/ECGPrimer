name: Build Desktop Apps (Windows + macOS)

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE (with icon)
        run: |
          pyinstaller --noconsole --onefile --name ECG_Digitizer --icon icon.ico ecg_app.py

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: ecg-app-windows
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # На macOS удобнее собирать .app (onedir), потом zip
      - name: Build .app
        run: |
          pyinstaller --windowed --onedir --name ECG_Digitizer ecg_app.py

      - name: Zip .app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent ECG_Digitizer.app ECG_Digitizer-macOS.zip

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: ecg-app-macos
          path: dist/ECG_Digitizer-macOS.zip
