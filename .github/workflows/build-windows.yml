name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          } else {
            pip install pyside6 numpy pandas matplotlib scipy pyinstaller
          }

      # Сборка с иконкой, если icon.ico существует
      - name: Build EXE (with icon)
        if: ${{ hashFiles('icon.ico') != '' }}
        run: |
          pyinstaller --onefile --noconsole --name "ECG_Digitizer" --icon icon.ico ecg_app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECG_Digitizer_Windows
          path: dist/ECG_Digitizer.exe
