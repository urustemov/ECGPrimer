name: Build Desktop Apps (Windows + macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------- WINDOWS ----------
      - name: Build Windows EXE
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconsole --onefile --name ECG_Digitizer --icon icon.ico ecg_app.py
          powershell -Command "Compress-Archive -Path dist/ECG_Digitizer.exe -DestinationPath ECG_Digitizer_Windows.zip"

      # ---------- macOS ----------
      - name: Build macOS APP
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --name ECG_Digitizer ecg_app.py
          ditto -c -k --sequesterRsrc --keepParent "dist/ECG_Digitizer.app" "ECG_Digitizer_macOS.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ECG_Digitizer_Windows.zip
            ECG_Digitizer_macOS.zip
